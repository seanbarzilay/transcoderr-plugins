name = "whisperx"
version = "0.1.3"
kind = "subprocess"
entrypoint = "bin/run"
provides_steps = ["whisperx.align", "whisperx.transcribe_aligned"]
summary = "Forced phoneme alignment for whisper output via WhisperX (wav2vec2-based)."
min_transcoderr_version = "0.27.0"
runtimes = ["python3", "ffmpeg"]
# Four-layer pin to keep Pascal (sm_61) GPU support working with
# wheel-only installs (no system pkg-config / ffmpeg-devel headers
# needed at install time).
#
# 1) torch == 2.3.1 / torchaudio == 2.3.1 — torch 2.4 dropped sm_61.
# 2) pyannote.audio == 3.3.2 — whisperx 3.1.6 hard-pins
#    pyannote.audio == 3.1.1, but that release calls
#    `torchaudio.set_audio_backend(...)` at import time, an API
#    removed in torchaudio 2.1. 3.3.2 dropped the call.
# 3) av == 12.3.0 with --only-binary=av — faster-whisper 1.0.0
#    pulls `av>=10` (PyAV); newer av releases drop wheels for some
#    Python/arch combos, forcing source build that needs pkg-config
#    + libav-dev. 12.3.0 has wheels for cp38..cp312 on linux x86_64
#    / aarch64 / i686, macOS, and Windows. --only-binary fails the
#    install fast on unsupported combos instead of hanging on a
#    confusing pkg-config error.
# 4) whisperx == 3.1.6 with --no-deps — bypasses the hard pyannote
#    pin. Newer whisperx (≥3.4) bumps the torch floor past 2.4.
deps = """\
python3 -m venv ./venv && \
./venv/bin/pip install 'torch==2.3.1' 'torchaudio==2.3.1' && \
./venv/bin/pip install --only-binary=av 'av==12.3.0' && \
./venv/bin/pip install 'pyannote.audio==3.3.2' 'faster-whisper==1.0.0' \
  'ctranslate2==4.4.0' transformers pandas nltk \
  nvidia-cublas-cu12 'nvidia-cudnn-cu12==9.*' && \
./venv/bin/pip install --no-deps 'whisperx==3.1.6'\
"""

[steps."whisperx.align"]
executor = "any-worker"

[steps."whisperx.transcribe_aligned"]
executor = "any-worker"
